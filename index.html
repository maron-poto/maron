<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARON — 예술 기록 스튜디오</title>
  <meta name="description" content="MARON은 예술가와 함께하는 전시·작품·퍼포먼스 기록 전문 스튜디오입니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a;
      background: #fff;
      font-weight: 300;
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      transition: padding 0.3s;
    }
    .nav-logo {
      font-family: 'Noto Sans KR', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.2em;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
      font-size: 12px;
      letter-spacing: 0.15em;
    }
    .nav-links a { opacity: 0.6; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 1; }

    /* ── Hero (수정됨: 흰색 배경 및 이미지 로고) ── */
    .hero {
      height: 100vh;
      background: #ffffff; /* 밝은 흰색 배경 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #1a1a1a; /* 어두운 텍스트 */
      position: relative;
      overflow: hidden;
    }
    /* 은은한 배경 디테일 (선택사항) */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.02) 0%, transparent 70%);
    }
    .hero-title {
      position: relative;
      margin-bottom: 32px;
    }
    .hero-title img {
      width: 280px; /* 로고의 적절한 너비 설정 */
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .hero-sub {
      font-size: 12px;
      letter-spacing: 0.3em;
      opacity: 0.6;
      position: relative;
      font-weight: 400;
    }
    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.2em;
      opacity: 0.4;
    }
    .hero-scroll::after {
      content: '';
      display: block;
      width: 1px;
      height: 40px;
      background: #1a1a1a; /* 스크롤 선 색상을 어둡게 변경 */
      animation: scrollLine 1.6s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { opacity: 0; transform: scaleY(0); transform-origin: top; }
      50% { opacity: 1; transform: scaleY(1); }
      100% { opacity: 0; transform: scaleY(0); transform-origin: bottom; }
    }

    /* ── Section Base ── */
    section { padding: 100px 48px; }
    .section-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      opacity: 0.4;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Noto Sans KR', serif;
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 48px;
    }

    /* ── About ── */
    #about {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .about-text p { font-size: 15px; line-height: 2; opacity: 0.75; margin-bottom: 16px; }
    .about-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 32px; }
    .tag { border: 1px solid rgba(0,0,0,0.2); padding: 6px 14px; font-size: 11px; letter-spacing: 0.1em; border-radius: 2px; }
    .about-info { padding-top: 56px; }
    .info-row { display: flex; align-items: flex-start; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 13px; }
    .info-row:first-child { border-top: 1px solid rgba(0,0,0,0.08); }
    .info-label { opacity: 0.4; min-width: 72px; font-size: 11px; letter-spacing: 0.1em; padding-top: 2px; }

    /* ── Services ── */
    #services { background: #f8f8f8; padding: 100px 48px; }
    .services-inner { max-width: 1200px; margin: 0 auto; }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: rgba(0,0,0,0.08); }
    .service-card { background: #fff; padding: 40px 32px; transition: background 0.2s; }
    .service-card:hover { background: #111; color: #fff; }
    .service-num { font-family: 'Noto Sans KR', serif; font-size: 36px; opacity: 0.15; line-height: 1; margin-bottom: 20px; }
    .service-name { font-size: 15px; font-weight: 500; margin-bottom: 12px; letter-spacing: 0.05em; }
    .service-desc { font-size: 12px; opacity: 0.55; line-height: 1.8; }

    /* ── Video Works ── */
    #video { max-width: 1200px; margin: 0 auto; }
    .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #111; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .video-caption { margin-top: 12px; font-size: 11px; letter-spacing: 0.1em; opacity: 0.45; }

    /* ── Process ── */
    #process { background: #111; color: #fff; padding: 100px 48px; }
    .process-inner { max-width: 1200px; margin: 0 auto; }
    #process .section-title, #process .section-label { color: #fff; }
    .process-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(255,255,255,0.1); }
    .process-item { background: #111; padding: 40px 32px; border-top: 1px solid rgba(255,255,255,0.08); }
    .process-num { font-family: 'Noto Sans KR', serif; font-size: 40px; opacity: 0.2; line-height: 1; margin-bottom: 16px; }
    .process-name { font-size: 14px; font-weight: 500; letter-spacing: 0.1em; margin-bottom: 10px; color: #fff; }
    .process-desc { font-size: 12px; opacity: 0.45; line-height: 1.8; }

    /* ── Portfolio ── */
    #portfolio { max-width: 1200px; margin: 0 auto; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    .portfolio-item { padding: 20px 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 13px; }
    .portfolio-item:nth-child(-n+4) { border-top: 1px solid rgba(0,0,0,0.08); }
    .portfolio-artist { font-weight: 500; margin-bottom: 4px; }
    .portfolio-type { font-size: 11px; opacity: 0.4; letter-spacing: 0.05em; }

    /* ── Contact ── */
    #contact { background: #f8f8f8; padding: 100px 48px; }
    .contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .contact-links { margin-top: 40px; }
    .contact-link { display: flex; align-items: center; gap: 16px; padding: 18px 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 14px; transition: opacity 0.2s; }
    .contact-link:first-child { border-top: 1px solid rgba(0,0,0,0.08); }
    .contact-link:hover { opacity: 0.6; }
    .contact-link-label { font-size: 10px; letter-spacing: 0.2em; opacity: 0.4; min-width: 72px; }
    .contact-cta { background: #111; color: #fff; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
    .cta-title { font-family: 'Noto Sans KR', serif; font-size: 28px; line-height: 1.4; font-weight: 400; }
    .cta-desc { font-size: 13px; opacity: 0.6; line-height: 1.8; }
    .cta-btn { display: inline-block; border: 1px solid rgba(255,255,255,0.4); padding: 14px 28px; font-size: 12px; letter-spacing: 0.15em; width: fit-content; transition: background 0.2s, color 0.2s; }
    .cta-btn:hover { background: #fff; color: #111; }

    /* ── Footer ── */
    footer { padding: 40px 48px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.08); font-size: 11px; opacity: 0.4; letter-spacing: 0.08em; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      section { padding: 64px 24px; }
      #about { grid-template-columns: 1fr; gap: 40px; }
      .about-info { padding-top: 0; }
      .services-grid { grid-template-columns: 1fr; }
      .video-grid { grid-template-columns: 1fr; }
      .process-list { grid-template-columns: 1fr; }
      .portfolio-grid { grid-template-columns: repeat(2, 1fr); }
      .contact-inner { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 8px; text-align: center; }
      .hero-title img { width: 200px; } /* 모바일 로고 크기 축소 */
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">MARON</span>
    <ul class="nav-links">
      <li><a href="#about">ABOUT</a></li>
      <li><a href="#services">SERVICES</a></li>
      <li><a href="#video">WORKS</a></li>
      <li><a href="#process">PROCESS</a></li>
      <li><a href="#portfolio">PORTFOLIO</a></li>
      <li><a href="#contact">CONTACT</a></li>
    </ul>
  </nav>

  <section class="hero" id="home">
    <div class="hero-title">
      <img src="images/maron_englogo.png" alt="MARON ART DOCUMENTATION STUDIO">
    </div>
    <p class="hero-sub">예술 기록 스튜디오 &nbsp;·&nbsp; ART DOCUMENTATION STUDIO</p>
    <div class="hero-scroll">SCROLL</div>
  </section>

  </body>
</html>
